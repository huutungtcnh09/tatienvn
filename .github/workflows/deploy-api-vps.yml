name: Deploy API VPS

on:
  push:
    branches:
      - main
    paths:
      - "services/api/**"
      - "shared/**"
      - "deploy/docker-compose.prod.yml"
      - "deploy/.env.prod.example"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-api-vps.yml"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Target deploy (api|api-caddy)"
        required: false
        default: api
        type: choice
        options:
          - api
          - api-caddy

concurrency:
  group: deploy-api-vps
  cancel-in-progress: true

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Guard main branch only
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::This workflow only deploys from main. Current ref: $GITHUB_REF"
          exit 1

      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || '27.71.26.161' }}
          VPS_PORT: ${{ secrets.VPS_PORT || secrets.SSH_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER || secrets.SSH_USER || 'root' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY || secrets.VPS_KEY || secrets.SSH_PRIVATE_KEY }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD || secrets.SSH_PASSWORD }}
        run: |
          set -e
          [ -n "$VPS_HOST" ] || { echo "::error::Missing VPS_HOST"; exit 1; }
          [ -n "$VPS_PORT" ] || { echo "::error::Missing VPS_PORT"; exit 1; }
          if [ -z "$VPS_SSH_KEY" ] && [ -z "$VPS_PASSWORD" ]; then
            echo "::error::Missing SSH credentials. Set one of VPS_SSH_KEY/VPS_KEY/SSH_PRIVATE_KEY or VPS_PASSWORD/SSH_PASSWORD"
            exit 1
          fi

      - name: Deploy API over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || 'api' }}
        with:
          host: ${{ secrets.VPS_HOST || '27.71.26.161' }}
          username: ${{ secrets.VPS_USER || secrets.SSH_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY || secrets.VPS_KEY || secrets.SSH_PRIVATE_KEY }}
          password: ${{ secrets.VPS_PASSWORD || secrets.SSH_PASSWORD }}
          port: ${{ secrets.VPS_PORT || secrets.SSH_PORT || '22' }}
          envs: DEPLOY_TARGET
          script: |
            set -e
            cd /opt/app-kd
            git fetch --all
            git reset --hard origin/main

            retry() {
              cmd="$1"
              attempt=1
              until sh -lc "$cmd"; do
                if [ "$attempt" -ge 2 ]; then
                  echo "Command failed after retry: $cmd"
                  return 1
                fi
                echo "Command failed, retrying once..."
                attempt=$((attempt + 1))
                sleep 3
              done
            }

            if [ "${DEPLOY_TARGET}" = "api-caddy" ]; then
              retry "docker compose -f deploy/docker-compose.prod.yml up -d --build api caddy"
              docker compose -f deploy/docker-compose.prod.yml ps api caddy
            else
              retry "docker compose -f deploy/docker-compose.prod.yml up -d --build api"
              docker compose -f deploy/docker-compose.prod.yml ps api
            fi

            curl -fsS http://127.0.0.1:14000/health >/dev/null
            curl -fsS https://api.tatien.vn/health >/dev/null
            ALLOW_ORIGIN=$(curl -sSI -H "Origin: https://pos.tatien.vn" https://api.tatien.vn/health | tr -d '\r' | awk -F': ' 'tolower($1)=="access-control-allow-origin"{print $2}' | tail -n 1)
            if [ "${ALLOW_ORIGIN}" != "https://pos.tatien.vn" ]; then
              echo "CORS check failed: expected Access-Control-Allow-Origin=https://pos.tatien.vn, got '${ALLOW_ORIGIN}'"
              exit 1
            fi
            echo "API deploy and health checks passed"

      - name: Deployment summary
        if: ${{ always() }}
        run: |
          {
            echo "## API Deploy Result"
            echo ""
            echo "- Status: ${{ job.status }}"
            echo "- Ref: $GITHUB_REF"
            echo "- Commit: $GITHUB_SHA"
            echo "- Triggered by: $GITHUB_ACTOR"
          } >> "$GITHUB_STEP_SUMMARY"