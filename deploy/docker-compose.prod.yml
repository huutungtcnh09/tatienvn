name: app-kd-prod

services:
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    env_file:
      - .env.prod
    restart: unless-stopped
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  head-office:
    build:
      context: ..
      dockerfile: apps/head-office/Dockerfile
      args:
        VITE_API_BASE_URL: https://api.tatien.vn
    restart: unless-stopped
    networks:
      - app_net

  store-pos:
    build:
      context: ..
      dockerfile: apps/store-pos/Dockerfile
      args:
        VITE_API_BASE_URL: https://api.tatien.vn
    restart: unless-stopped
    networks:
      - app_net

  corporate-web:
    build:
      context: ..
      dockerfile: apps/corporate-web/Dockerfile
      args:
        VITE_API_BASE_URL: https://api.tatien.vn
    restart: unless-stopped
    networks:
      - app_net

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - api
      - head-office
      - store-pos
      - corporate-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - app_net

networks:
  app_net:

volumes:
  caddy_data:
  caddy_config:
